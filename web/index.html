<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Collie" />
    <title>Collie</title>
    <!-- The web manifest <link> is injected by vite-plugin-pwa at build time. -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- First-paint splash: the galloping Collie shown the instant the PWA opens, bridging the OS
         launch splash and React mount (createRoot replaces #root, so it clears itself). Critical CSS
         is inlined here so it paints and animates before the app bundle/index.css load — pure CSS,
         no JS. It mirrors routes/root.tsx's BootSplash (same sprite, 4rem, copy) so the hand-off is
         seamless. Sprite math matches .dog-gallop in index.css: dog-gallop.png is a 768×128 strip of
         six 128px frames, stepped with steps(6). -->
    <style>
      .boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        background: #0a0a0a;
        color: #a1a1a1;
        font: 500 0.875rem/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .boot-splash__dog {
        --dog-size: 4rem;
        --dog-frames: 6;
        width: var(--dog-size);
        height: var(--dog-size);
        background: url("/dog-gallop.png") no-repeat 0 0;
        background-size: calc(var(--dog-frames) * var(--dog-size)) var(--dog-size);
        animation: boot-dog-gallop 0.6s steps(6) infinite;
      }
      @keyframes boot-dog-gallop {
        to {
          background-position: calc(-1 * var(--dog-frames) * var(--dog-size)) 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-splash__dog {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash" role="status" aria-label="Loading Collie">
        <span class="boot-splash__dog" aria-hidden="true"></span>
        <span>Connecting to the herd…</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
